services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    networks:
      - pixel
    entrypoint: >
      sh -c "mkdir -p /var/www/html/var/rate_limit
             && chmod -R 775 /var/www/html/var
             && chown -R www-data:www-data /var/www/html/var
             && php-fpm"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - pixel

networks:
  pixel:
    driver: bridge
